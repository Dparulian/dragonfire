name: Dragon Fire Automated Cloud Engine

on:
  # ── HANYA schedule, tidak ada workflow_dispatch ──────────────────
  # workflow_dispatch dihilangkan untuk mencegah double-run manual.
  # Jika perlu jalankan manual: gunakan tombol "Re-run jobs" pada run
  # terakhir, atau tambahkan kembali workflow_dispatch sementara.
  schedule:
    # Berjalan Senin–Jumat pukul 18:00 WIB tepat (= 11:00 UTC)
    # Format: menit jam hari-bulan bulan hari-minggu
    #   0   = menit ke-0 (tepat)
    #   11  = jam 11 UTC = jam 18 WIB (UTC+7)
    #   *   = setiap tanggal
    #   *   = setiap bulan
    #   1-5 = Senin (1) sampai Jumat (5)
    - cron: '0 11 * * 1-5'

jobs:
  run-ai-screener:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Ambil Kode Dari Repository
        uses: actions/checkout@v4

      - name: 2. Siapkan Environment Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Install Seluruh Library Belanjaan
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Jalankan Mesin Kuantitatif AI & Tembak ke Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python dragon_fire.py
