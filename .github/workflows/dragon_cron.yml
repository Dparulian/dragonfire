name: Dragon Fire Automated Cloud Engine

on:
  # ── TRIGGER 1: Jalankan manual dari tab Actions GitHub ───────────
  # Buka github.com/Dparulian/dragonfire → tab Actions →
  # pilih workflow ini → klik tombol "Run workflow" → klik "Run workflow"
  # ⚠️  CATATAN: Jika dijalankan manual pada hari kerja setelah jam 18:00 WIB,
  # script akan otomatis menghapus data hari ini di screener_history
  # sebelum menulis ulang, sehingga tidak ada duplikat.
  workflow_dispatch:

  # ── TRIGGER 2: Otomatis Senin–Jumat pukul 18:00 WIB (= 11:00 UTC) ─
  schedule:
    - cron: '0 11 * * 1-5'

jobs:
  run-ai-screener:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Ambil Kode Dari Repository
        uses: actions/checkout@v4

      - name: 2. Siapkan Environment Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Install Seluruh Library Belanjaan
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Jalankan Mesin Kuantitatif AI & Tembak ke Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python dragon_fire.py
