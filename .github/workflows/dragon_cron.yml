name: Dragon Fire + Tiger Hunter Cloud Engine

on:
  workflow_dispatch:   # Jalankan manual dari tab Actions GitHub

  schedule:
    # Senin–Jumat pukul 18:00 WIB (= 11:00 UTC)
    - cron: '0 11 * * 1-5'

jobs:
  # ── Job 1: Dragon Fire (jalan dulu) ──────────────────────────────
  dragon-fire:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Dragon Fire
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python dragon_fire.py

  # ── Job 2: Tiger Hunter (jalan setelah Dragon Fire selesai) ──────
  tiger-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Tiger lebih lama karena ensemble model
    needs: dragon-fire          # ← tunggu dragon-fire sukses dulu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tiger Hunter
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python dragon_hunt_tiger_cloud.py
