name: Dragon Fire Automated Cloud Engine

on:
  workflow_dispatch: # 🌟 Tetap memunculkan tombol "Run workflow" manual dari Safari iPhone Anda
  schedule:
    # Otomatis berjalan setiap Senin - Jumat pukul 17:05 WIB (10:05 UTC)
    - cron: '5 10 * * 1-5'

jobs:
  run-ai-screener:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Ambil Kode Dari Repository
        uses: actions/checkout@v4

      - name: 2. Siapkan Environment Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Install Seluruh Library Belanjaan
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Jalankan Mesin Kuantitatif AI & Tembak ke Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python dragon_fire.py
