name: Dragon Fire Automated Cloud Engine

on:
  workflow_dispatch:   # Jalankan manual dari tab Actions GitHub

  schedule:
    # Senin–Jumat pukul 17:45 WIB (= 10:45 UTC) — jadwal lebih sepi dari jam bulat
    - cron: '45 10 * * 1-5'

jobs:
  dragon-fire:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Dragon Fire
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python dragon_fire.py
